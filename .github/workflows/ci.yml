name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip isort
        python -m pip install pre-commit
    - name: Run pre-commit
      run: python -m pre_commit run --all-files
  test:
    name: Run tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install uv and set up environment
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/astro-informatics/s2fft.git@ASKabalan
          pip install .[test]

      - name: Run tests
        run: |
          pip list | grep -E "numpy|healpy|jax|s2fft"
          pytest -v -m "not slow" --tb=short 2>&1 || true
          pytest -v tests/sphtfunc/test_spin_transforms.py::test_map2alm_spin_different_spins -x --tb=long
